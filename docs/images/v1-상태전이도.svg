<svg xmlns="http://www.w3.org/2000/svg" width="680" height="535" viewBox="0 0 680 535" font-family="'Apple SD Gothic Neo','Helvetica Neue',sans-serif" role="img">
<title>스마트 신호등 v1 초기버전 상태전이도</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="535" fill="#ffffff"/>

<rect x="190" y="50" width="300" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="340" y="79" text-anchor="middle" font-size="15" font-weight="500" fill="#27500A">VEHICLE_GREEN</text>
<text x="340" y="98" text-anchor="middle" font-size="12" fill="#3B6D11">초록불 · 차량 통행</text>

<rect x="190" y="170" width="300" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text x="340" y="199" text-anchor="middle" font-size="15" font-weight="500" fill="#791F1F">PEDESTRIAN_GREEN</text>
<text x="340" y="218" text-anchor="middle" font-size="12" fill="#A32D2D">빨간불 · 보행 시작</text>

<rect x="190" y="290" width="300" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="319" text-anchor="middle" font-size="15" font-weight="500" fill="#633806">WARNING</text>
<text x="340" y="338" text-anchor="middle" font-size="12" fill="#854F0B">빨강+노랑 · 과도기</text>

<rect x="190" y="410" width="300" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text x="340" y="439" text-anchor="middle" font-size="15" font-weight="500" fill="#791F1F">PEDESTRIAN_CROSSING</text>
<text x="340" y="458" text-anchor="middle" font-size="12" fill="#A32D2D">빨간불 · 보행자 횡단</text>

<line x1="340" y1="110" x2="340" y2="168" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="144" font-size="12" fill="#5F5E5A">버튼 / 거리&lt;15</text>

<line x1="340" y1="230" x2="340" y2="288" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="264" font-size="12" fill="#5F5E5A">3초 후</text>

<line x1="340" y1="350" x2="340" y2="408" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="384" font-size="12" fill="#5F5E5A">3초 후</text>

<path d="M190 440 L100 440 L100 80 L188 80" fill="none" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="52" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">10초 후</text>

<path d="M490 66 L548 66 L548 94 L492 94" fill="none" stroke="#73726C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="500" y="118" font-size="12" fill="#5F5E5A">그 외 · 10초 유지</text>

<rect x="60" y="499" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="80" y="510" font-size="12" fill="#5F5E5A">초록불 · 차량 통행</text>
<rect x="262" y="499" width="14" height="14" rx="3" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text x="282" y="510" font-size="12" fill="#5F5E5A">빨간불 · 정지/보행</text>
<rect x="472" y="499" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="492" y="510" font-size="12" fill="#5F5E5A">적+황 · 과도기</text>
</svg>
